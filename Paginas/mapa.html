<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localização da Empresa</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../png-svg/favicon.svg" type="image/svg+xml">
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f5f7;
            color: #111;
        }
        header {
            padding: 1.5rem;
            text-align: center;
            background: #222;
            color: #fff;
        }
        header h1 {
            margin: 0 0 0.5rem;
            font-size: 1.75rem;
        }
        header p {
            margin: 0;
            opacity: 0.85;
        }
        main {
            padding: 1rem;
        }
        .map-container {
            width: 100%;
            min-height: 400px;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);
            border-radius: 0.5rem;
            overflow: hidden;
            background: #fff;
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
            min-height: 450px;
        }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #0d6efd;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Localização</h1>
        <p>Mapa de endereço da empresa para contato ou visita.</p>
    </header>
    <main>
        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3839.0203598501255!2d-47.8837266!3d-15.793838!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTXCsDQ3JzM3LjgiUyA0N8KwNTMnMDEuNCJX!5e0!3m2!1spt-BR!2sbr!4v1700000000000!5m2!1spt-BR!2sbr"
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
        <a class="back-link" href="../index.html">&larr; Voltar para a página inicial</a>
    </main>
</body>
</html>
